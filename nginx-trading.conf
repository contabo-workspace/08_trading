upstream gunicorn_trading {
    server 127.0.0.1:8008;
}

# HTTPS
server {
    server_name trading.hs-dev.cz;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location /static/ {
        alias /srv/apps/08_trading/staticfiles/;
    }

    location / {
        include proxy_params;
        proxy_pass http://gunicorn_trading;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/trading.hs-dev.cz/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/trading.hs-dev.cz/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot
}

# HTTP → HTTPS redirect
server {
    if ($host = trading.hs-dev.cz) {
        return 301 https://$host$request_uri;
    } # managed by Certbot

    listen 80;
    server_name trading.hs-dev.cz;
    return 404; # managed by Certbot
}
